services:

  catalogapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: catalogapi
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__CatalogDB=Server=sqlserver;Database=CatalogDB;User Id=sa;Password=Sa12345678!;TrustServerCertificate=True
      - JwtSettings__SecretKey=S3cr3tK3y!@#_JWT_FCG_2024$%^
      - JwtSettings__ExpiracaoHoras=2
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__VHost=/
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - fcg-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: sqlserver-catalog
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Sa12345678!
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Sa12345678!", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - fcg-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-catalog
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - fcg-network

networks:
  fcg-network:
    driver: bridge
